                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: У пользователя недостаточно прав для выполнения этой операции
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      summary: Получение мероприятий, на которые зарегистрирован текущий пользователь.
        Allowed roles=[USER]
      tags:
      - Registrations
components:
  parameters:
    locationId:
      description: Уникальный идентификатор местоположения
      in: path
      name: locationId
      required: true
      schema:
        example: 42
        format: int64
        type: integer
    userId:
      description: Уникальный идентификатор пользователя
      in: path
      name: userId
      required: true
      schema:
        format: int64
        type: integer
    eventId:
      description: Уникальный идентификатор мероприятия
      in: path
      name: eventId
      required: true
      schema:
        example: 10
        format: int64
        type: integer
  responses:
    BadRequest:
      content:
        application/json:
          example:
            message: Некорректный запрос
            detailedMessage: Более детальное сообщение об ошибке
            dateTime: '2024-12-03T10:15:30'
          schema:
            "$ref": "#/components/schemas/ErrorMessageResponse"
      description: Запрос с невалидными данными. Например, попытка занять занятый
        логин или некорректные параметры запроса.
    Unauthorized:
      content:
        application/json:
          example:
            message: Необходима аутентификация
            detailedMessage: Более детальное сообщение об ошибке
            dateTime: '2024-12-03T10:15:30'
          schema:
            "$ref": "#/components/schemas/ErrorMessageResponse"
      description: Аутентификация отсутствует или не удалась
    Forbidden:
      content:
        application/json:
          example:
            message: Недостаточно прав для выполнения операции
            detailedMessage: Более детальное сообщение об ошибке
            dateTime: '2024-12-03T10:15:30'
          schema:
            "$ref": "#/components/schemas/ErrorMessageResponse"
      description: У пользователя недостаточно прав для выполнения этой операции
    NotFound:
      content:
        application/json:
          example:
            message: Сущность не найдена
            detailedMessage: Более детальное сообщение об ошибке
            dateTime: '2024-12-03T10:15:30'
          schema:
            "$ref": "#/components/schemas/ErrorMessageResponse"
      description: Сущность не найдена.
    ServerError:
      content:
        application/json:
          example:
            message: Внутренняя ошибка сервера
            detailedMessage: Более детальное сообщение об ошибке
            dateTime: '2024-12-03T10:15:30'
          schema:
            "$ref": "#/components/schemas/ErrorMessageResponse"
      description: Внутренняя ошибка сервера
  schemas:
    ErrorMessageResponse:
      example:
        message: Сообщение об ошибке
        detailedMessage: Более детальное сообщение об ошибке
        dateTime: '2024-12-03T10:15:30'
      properties:
        message:
          description: Человеко-читаемое сообщение об ошибке
          type: string
        detailedMessage:
          description: Более детальное сообщение об ошибке. Например, содержимое exception
          type: string
        dateTime:
          description: Дата и время возникновения ошибки. Формат "YYYY-MM-DDThh:mm:ss"
          format: date-time
          type: string
      required:
      - dateTime
      - detailedMessage
      - message
      type: object
    EventLocation:
      example:
        id: 42
        name: Ледовый дворец
        address: г. СПб, Пятилеток 1
        capacity: 12300
        description: Спортивно-концертный комплекс в Санкт-Петербурге
      properties:
        id:
          description: Уникальный идентификатор локации
          format: int64
          readOnly: true
          type: integer
        name:
          description: Имя локации
          type: string
        address:
          description: Адрес локации
          type: string
        capacity:
          description: Вместительность локации
          minimum: 5
          type: integer
        description:
          description: Дополнительное описание локации
          type: string
      required:
      - address
      - capacity
      - name
      type: object
    User:
      description: Данные пользователя
      example:
        id: 10
        login: user_login
        age: 21
        role: USER
      properties:
        id:
          description: Уникальный идентификатор пользователя
          format: int64
          type: integer
        login:
          description: Уникальный логин пользователя
          type: string
        age:
          description: возраст пользователя
          minimum: 0
          type: integer
        role:
          description: Роль пользователя
          enum:
          - ADMIN
          - USER
          type: string
      required:
      - age
      - id
      - login
      - role
      type: object
    UserRegistration:
      description: Данные для регистрации пользователя
      example:
        login: new_user
        password: strongpassword
        age: 21
      properties:
        login:
          description: Логин пользователя. Должен быть уникальным
          type: string
        password:
          description: Пароль пользователя
          type: string
        age:
          description: Возраст пользователя
          minimum: 18
          type: integer
      required:
      - age
      - login
      - password
      type: object
    JwtResponse:
      example:
        jwtToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      properties:
        jwtToken:
          description: JWT token for authenticated user
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          type: string
      type: object
    UserCredentials:
      description: Данные для авторизации пользователя. Для получения JWT-токена
      example:
        login: user_login
        password: userpassword
      properties:
        login:
          description: Логин пользователя для авторизации
          type: string
        password:
          description: Пароль пользователя
          type: string
      required:
      - login
      - password
      type: object
    EventDto:
      example:
        occupiedPlaces: 7
        date: '2000-01-23T04:56:07.000+00:00'
        duration: 60
        cost: 1200
        maxPlaces: 10
        locationId: 5
        name: Лекция по Java
        id: 42
        ownerId: 10
        status: WAIT_START
      properties:
        id:
          example: 42
          format: int64
          type: integer
        name:
          description: Название мероприятия
          example: Лекция по Java
          type: string
        ownerId:
          description: id пользователя-создателя мероприятия
          example: 10
          type: integer
        maxPlaces:
          description: Максимальное кол-во мест на мероприятии
          example: 10
          type: integer
        occupiedPlaces:
          description: Кол-во уже занятых мест (создатель не учитывается при подсчете)
          example: 7
          type: integer
        date:
          description: Дата и время проведения мероприятия. Формат "YYYY-MM-DDThh:mm:ss"
          format: date-time
          type: string
        cost:
          description: Стоимость в рублях
          example: 1200
          minimum: 1
          type: integer
        duration:
          description: Длительность в минутах
          example: 60
          minimum: 30
          type: integer
        locationId:
          description: Идентификатор локации, где проходит мероприятие
          type: integer
        status:
          "$ref": "#/components/schemas/EventStatus"
      required:
      - cost
      - date
      - duration
      - id
      - locationId
      - maxPlaces
      - name
      - occupiedPlaces
      - ownerId
      - status
      type: object
    EventStatus:
      description: |-
        * WAIT_START - мероприятие ожидает начала. Доступные новые регистрации в этом состоянии.
        В этом состоянии еще возможно отменить мероприятие (перевести в статус CANCELLED), в остальных - нельзя.
        * STARTED - мероприятие началось. Новые регистрации недоступны на мероприятие.
        * CANCELLED - мероприятие отменено организтором. Новые регистрации недоступны на мероприятие.
        * FINISHED - мероприятие окончилось. Новые регистрации недоступны на мероприятие.
      enum:
      - WAIT_START
      - STARTED
      - CANCELLED
      - FINISHED
      example: WAIT_START
      type: string
    EventCreateRequestDto:
      description: Объект с данными для создания нового мероприятия.
      example:
        date: '2000-01-23T04:56:07.000+00:00'
        duration: 60
        cost: 1200
        maxPlaces: 10
        locationId: 10
        name: Лекция по Java
      properties:
        name:
          description: Название мероприятия
          example: Лекция по Java
          type: string
        maxPlaces:
          description: Максимальное кол-во мест на мероприятии
          example: 10
          type: integer
        date:
          description: Дата и время проведения мероприятия. Формат "YYYY-MM-DDThh:mm:ss"
          format: date-time
          type: string
        cost:
          description: Стоимость в рублях
          example: 1200
          minimum: 1
          type: integer
        duration:
          description: Длительность в минутах
          example: 60
          minimum: 30
          type: integer
        locationId:
          description: Идентификатор локации, где проходит мероприятие
          example: 10
          type: integer
      required:
      - cost
      - date
      - duration
      - locationId
      - maxPlaces
      - name
      type: object
    EventUpdateRequestDto:
      description: Объект с данными для обновления мероприятия
      example:
        date: '2000-01-23T04:56:07.000+00:00'
        duration: 60
        cost: 3000
        maxPlaces: 100
        locationId: 50
        name: Новое назание
      properties:
        name:
          description: Новое название мероприятия
          example: Новое назание
          type: string
        maxPlaces:
          description: Новое кол-во мест мероприятия. Локация должна позволять вместить
            столько людей. Должно быть больше, чем уже записанных людей.
          example: 100
          type: integer
        date:
          description: Новая дата и время проведения мероприятия. Формат "YYYY-MM-DDThh:mm:ss"
          format: date-time
          type: string
        cost:
          description: Новая стоимость мероприятия в рублях
          example: 3000
          minimum: 1
          type: integer
        duration:
          description: Новая длительность в минутах
          example: 60
          minimum: 30
          type: integer
        locationId:
          description: Новая локация для мероприятия. Локация должна вмещать количество
            пользователей, которые уже записаны. Также локация должна вмещать maxPlaces
            - кол-во мест на мероприятии.
          example: 50
          type: integer
      type: object
    EventSearchRequestDto:
      description: Фильтр для поиска мероприятий. Обязательных полей нет. Если все
        поля не заданы, то должен вернуться список всех мероприятий
      example:
        durationMax: 120
        dateStartBefore: '2000-01-23T04:56:07.000+00:00'
        placesMin: 10
        locationId: 5
        eventStatus: WAIT_START
        name: Лекция
        placesMax: 100
        costMin: 1000
        dateStartAfter: '2000-01-23T04:56:07.000+00:00'
        costMax: 5000
        durationMin: 60
      properties:
        name:
          description: Имя мероприятия для поиска по точному совпадению
          example: Лекция
          type: string
        placesMin:
          description: Минимальная вместимость мероприятия
          example: 10
          type: integer
        placesMax:
          description: Максимальная вместимость мероприятия
          example: 100
          type: integer
        dateStartAfter:
          description: Минимальная дата и время начала мероприятия. Формат "YYYY-MM-DDThh:mm:ss"
          format: date-time
          type: string
        dateStartBefore:
          description: Максимальная дата и время начала мероприятия. Формат "YYYY-MM-DDThh:mm:ss"
          format: date-time
          type: string
        costMin:
          description: Минимальная стоимость участия в рублях
          example: 1000
          type: integer
        costMax:
          description: Максимальная стоимость участия в рублях
          example: 5000
          type: integer
        durationMin:
          description: Минимальная длительность мероприятия (в минутах)
          example: 60
          type: integer
        durationMax:
          description: Максимальная длительность мероприятия (в минутах)
          example: 120
          type: integer
        locationId:
          description: Идентификатор локации мероприятия для фильтрации
          example: 5
          type: integer
        eventStatus:
          "$ref": "#/components/schemas/EventStatus"
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http

---
openapi: 3.0.0
info:
  description: API for managing event locations
  title: Event Management Service
  version: 1.0.0
servers:
- url: http://localhost:8080
security:
- bearerAuth: []
tags:
- name: Auth
  description: Registration and authentication with JWT access tokens
- name: Users
  description: User management endpoints
- name: Locations
  description: Location CRUD and capacity constraints
- name: Events
  description: Event CRUD, search and ownership rules
- name: Registrations
  description: User registration and cancellation for events
paths:
  "/locations":
    get:
      description: |-
        Получение списка всех локаций.

        Изменения по итерациям:
        - Итерация 1: добавить endpoint для получения списка локаций.
        - Итерация 2: endpoint теперь вызывается только с Bearer JWT; доступ разрешен ролям ADMIN и USER.
        - Итерация 5: изменена внутренняя логика чтения; используется cache-aside для списка локаций с Redis.
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  "$ref": "#/components/schemas/EventLocation"
                type: array
          description: Список всех локаций
        '401':
          content:
            application/json:
              example:
                message: Необходима аутентификация
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Аутентификация отсутствует или не удалась
        '403':
          content:
            application/json:
              example:
                message: Недостаточно прав для выполнения операции
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: У пользователя недостаточно прав для выполнения этой операции
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      summary: Получить список всех локаций. Allowed roles=[ADMIN, USER]
      tags:
      - Locations
    post:
      description: |-
        Создать новую локацию. Id должен задаваться на стороне приложения (базой данных).

        Изменения по итерациям:
        - Итерация 1: добавить endpoint для создания локации с валидацией request body и возвратом созданной сущности.
        - Итерация 2: endpoint теперь вызывается только с Bearer JWT; доступ разрешен только роли ADMIN.
        - Итерация 5: изменена внутренняя логика после записи; добавлена инвалидация кешей локаций.
      requestBody:
        content:
          application/json:
            example:
              name: Ледовый дворец
              address: г. СПб, Пятилеток 1
              capacity: 12300
              description: Спортивно-концертный комплекс в Санкт-Петербурге
            schema:
              "$ref": "#/components/schemas/EventLocation"
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/EventLocation"
          description: Место успешно создано
        '400':
          content:
            application/json:
              example:
                message: Некорректный запрос
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Запрос с невалидными данными. Например, попытка занять занятый
            логин или некорректные параметры запроса.
        '401':
          content:
            application/json:
              example:
                message: Необходима аутентификация
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Аутентификация отсутствует или не удалась
        '403':
          content:
            application/json:
              example:
                message: Недостаточно прав для выполнения операции
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: У пользователя недостаточно прав для выполнения этой операции
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      summary: Создать новую локацию. Allowed roles=[ADMIN]
      tags:
      - Locations
  "/locations/{locationId}":
    delete:
      description: |-
        Удалить локацию по идентификатору.

        Изменения по итерациям:
        - Итерация 1: добавить endpoint для удаления локации по locationId. Если локация не найдена, должен возвращаться 404.
        - Итерация 2: endpoint теперь вызывается только с Bearer JWT; доступ разрешен только роли ADMIN.
        - Итерация 3: добавить ограничение; нельзя удалять локацию, если на ней уже есть мероприятия. В этом случае должен возвращаться 400.
        - Итерация 5: изменена внутренняя логика после удаления; добавлена инвалидация кешей локаций.
      parameters:
      - description: Уникальный идентификатор местоположения
        in: path
        name: locationId
        required: true
        schema:
          example: 42
          format: int64
          type: integer
      responses:
        '204':
          description: Место успешно удалено
        '400':
          content:
            application/json:
              example:
                message: Некорректный запрос
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Запрос с невалидными данными. Например, попытка удалить локацию, на которой уже есть мероприятия.
        '401':
          content:
            application/json:
              example:
                message: Необходима аутентификация
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Аутентификация отсутствует или не удалась
        '403':
          content:
            application/json:
              example:
                message: Недостаточно прав для выполнения операции
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: У пользователя недостаточно прав для выполнения этой операции
        '404':
          content:
            application/json:
              example:
                message: Сущность не найдена
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Сущность не найдена.
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      summary: Удалить локацию. Allowed roles=[ADMIN]
      tags:
      - Locations
    get:
      description: |-
        Получить локацию по идентификатору.

        Изменения по итерациям:
        - Итерация 1: добавить endpoint для получения локации по locationId. Если локация не найдена, должен возвращаться 404.
        - Итерация 2: endpoint теперь вызывается только с Bearer JWT; доступ разрешен ролям ADMIN и USER.
        - Итерация 5: изменена внутренняя логика чтения; используется cache-aside для локации по id с Redis.
      parameters:
      - description: Уникальный идентификатор местоположения
        in: path
        name: locationId
        required: true
        schema:
          example: 42
          format: int64
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/EventLocation"
          description: Успешный ответ
        '400':
          content:
            application/json:
              example:
                message: Некорректный запрос
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Запрос с невалидными данными. Например, попытка занять занятый
            логин или некорректные параметры запроса.
        '401':
          content:
            application/json:
              example:
                message: Необходима аутентификация
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Аутентификация отсутствует или не удалась
        '403':
          content:
            application/json:
              example:
                message: Недостаточно прав для выполнения операции
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: У пользователя недостаточно прав для выполнения этой операции
        '404':
          content:
            application/json:
              example:
                message: Сущность не найдена
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Сущность не найдена.
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      summary: Получить локацию по ID. Allowed roles=[ADMIN, USER]
      tags:
      - Locations
    put:
      description: |-
        Обновить локацию по идентификатору.

        Изменения по итерациям:
        - Итерация 1: добавить endpoint для обновления локации с валидацией request body. Если локация не найдена, должен возвращаться 404.
        - Итерация 2: endpoint теперь вызывается только с Bearer JWT; доступ разрешен только роли ADMIN.
        - Итерация 3: добавить ограничение; нельзя уменьшать capacity, если это нарушает ограничения уже существующих мероприятий на этой локации. В этом случае должен возвращаться 400.
        - Итерация 5: изменена внутренняя логика после обновления; добавлена инвалидация кешей локаций.
      parameters:
      - description: Уникальный идентификатор местоположения
        in: path
        name: locationId
        required: true
        schema:
          example: 42
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            example:
              name: Новое имя локации
              address: Новый адрес
              capacity: 20000
              description: Новое описание
            schema:
              "$ref": "#/components/schemas/EventLocation"
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/EventLocation"
          description: Место успешно обновлено
        '400':
          content:
            application/json:
              example:
                message: Некорректный запрос
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Запрос с невалидными данными. Например, попытка занять занятый
            логин или некорректные параметры запроса.
        '401':
          content:
            application/json:
              example:
                message: Необходима аутентификация
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Аутентификация отсутствует или не удалась
        '403':
          content:
            application/json:
              example:
                message: Недостаточно прав для выполнения операции
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: У пользователя недостаточно прав для выполнения этой операции
        '404':
          content:
            application/json:
              example:
                message: Сущность не найдена
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Сущность не найдена.
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      summary: Обновить локацию. Allowed roles=[ADMIN]
      tags:
      - Locations
  "/users":
    post:
      description: |-
        Доступно без авторизации. По умолчанию создается пользователь с ролью USER. Пользователя с ролью ADMIN создать должно быть невозможно. Должна быть проверена уникальность логина. Логины должны быть различные у разных пользователей.

        Изменения по итерациям:
        - Итерация 2: endpoint добавлен.
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UserRegistration"
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/User"
          description: Пользователь успешно зарегистрирован
        '400':
          content:
            application/json:
              example:
                message: Некорректный запрос
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Запрос с невалидными данными. Например, попытка занять занятый
            логин или некорректные параметры запроса.
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      security: []
      summary: Регистрация нового пользователя [доступно без JWT]
      tags:
      - Auth
  "/users/{userId}":
    get:
      description: |-
        Получение данных пользователя (доступно только админам). Учтите, что пароль не должен возвращаться в теле

        Изменения по итерациям:
        - Итерация 2: endpoint добавлен.
      parameters:
      - description: Уникальный идентификатор пользователя
        in: path
        name: userId
        required: true
        schema:
          format: int64
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/User"
          description: Информация о пользователе
        '401':
          content:
            application/json:
              example:
                message: Необходима аутентификация
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Аутентификация отсутствует или не удалась
        '403':
          content:
            application/json:
              example:
                message: Недостаточно прав для выполнения операции
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: У пользователя недостаточно прав для выполнения этой операции
        '404':
          content:
            application/json:
              example:
                message: Сущность не найдена
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Сущность не найдена.
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      summary: Получить информацию о пользователе по ID. Allowed roles=[ADMIN]
      tags:
      - Users
  "/users/auth":
    post:
      description: |-
        Доступно без авторизации. Получение JWT токена по данным пользователя

        Изменения по итерациям:
        - Итерация 2: endpoint добавлен.
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UserCredentials"
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/JwtResponse"
          description: Авторизация успешна, возвращен JWT
        '400':
          content:
            application/json:
              example:
                message: Некорректный запрос
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Запрос с невалидными данными. Например, попытка занять занятый
            логин или некорректные параметры запроса.
        '401':
          content:
            application/json:
              example:
                message: Необходима аутентификация
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Аутентификация отсутствует или не удалась
        '500':
          content:
            application/json:
              example:
                message: Внутренняя ошибка сервера
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Внутренняя ошибка сервера
      security: []
      summary: Авторизация пользователя и получение JWT [доступно без JWT]
      tags:
      - Auth
  "/events":
    post:
      description: |-
        Учтите валидацию всех полей. Все поля обязательные при создании, также должна быть соблюдена логика (например время не может быть в прошлом, стомость > 0 и т.д.) Локация должна существовать и ее вместимость должна позволять провести это мероприятие, т.е. кол-во мест должно быть достаточно для всех участников. Организатор (создатель) мероприятия не учитывается как участник.

        Изменения по итерациям:
        - Итерация 3: endpoint добавлен.
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/EventCreateRequestDto"
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/EventDto"
          description: Мероприятие успешно создано. Возвращается созданное событие.
        '400':
          content:
            application/json:
              example:
                message: Некорректный запрос
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Запрос с невалидными данными. Например, попытка занять занятый
            логин или некорректные параметры запроса.
        '401':
          content:
            application/json:
              example:
                message: Необходима аутентификация
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
              schema:
                "$ref": "#/components/schemas/ErrorMessageResponse"
          description: Аутентификация отсутствует или не удалась
        '403':
          content:
            application/json:
              example:
                message: Недостаточно прав для выполнения операции
                detailedMessage: Более детальное сообщение об ошибке
                dateTime: '2024-12-03T10:15:30'
